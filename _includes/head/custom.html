<!-- start custom head snippets -->
<style>
    /* 1. Replaces the text in the top navigation bar with your custom favicon */
    .site-title {
        font-size: 0 !important; /* Hides the "Maggie Zhang" text */
    }
        
    .page__title {
        display: none !important;
    }

    .site-title {
        display: none !important;
    }

    .site-title::before {
        content: ""; /* We leave this empty because we are using a background image now */
        display: inline-block;
        width: 28px;  /* Adjust these numbers to make your icon bigger or smaller! */
        height: 28px;
        background-image: url('{{ "/favicon-96x96.png" | relative_url }}');/* Points directly to your image file */
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        transition: opacity 0.2s ease;
        vertical-align: middle; /* Keeps the image perfectly centered with the other menu buttons */
    }

    /* Optional: Adds a nice fade effect when you hover over it */
    .site-title:hover::before {
        opacity: 0.6; 
    }
html {
        font-size: 18px !important; /* The default is 16px. Try 15px or 14px until it feels right! */
    }
   </style>
<!-- insert favicons. use https://realfavicongenerator.net/ -->
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
